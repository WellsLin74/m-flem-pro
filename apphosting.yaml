# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  cpu: 4
  memoryMiB: 8192
  minInstances: 0
  maxInstances: 1

# Environment variables and secrets.
env:
  - variable: NEXT_SKIP_TYPESCRIPT_CHECK
    value: "1"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_SKIP_ESLINT
    value: "1"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
    availability:
      - BUILD
      - RUNTIME
